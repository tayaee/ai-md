server {
    listen 80;
    server_name _;

    # 루트는 .ai.md 파이프라인 밖의 순정적 페이지 (ADR-0001 개정): engine을 거치지 않는다
    location = / {
        root /opt/aimd/public;
        try_files /index.html =404;
    }

    location / {
        # dist/<경로>.html 이 존재하면 LLM 없이 즉시 정적 서빙 (Frozen Artifact)
        root /opt/aimd/dist;
        try_files $uri.html @engine;
    }

    location @engine {
        proxy_pass http://engine:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        # 첫 요청 동기 블로킹 컴파일 대기 (ADR-0003)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
