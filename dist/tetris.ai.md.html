<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AIMD - Terminal Tetris</title>
<style>
  /* Terminal dark theme */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #000;
    color: #0f0;
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  
  /* CRT scanline effect */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      rgba(0, 255, 0, 0.03),
      rgba(0, 255, 0, 0.03) 1px,
      transparent 1px,
      transparent 2px
    );
    pointer-events: none;
    z-index: 100;
  }
  
  .container {
    display: flex;
    gap: 30px;
    align-items: flex-start;
  }
  
  .title {
    font-size: 24px;
    text-align: center;
    margin-bottom: 20px;
    text-shadow: 0 0 10px #0f0;
    letter-spacing: 4px;
  }
  
  .cursor {
    animation: blink 1s infinite;
  }
  
  @keyframes blink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0; }
  }
  
  canvas {
    border: 2px solid #0f0;
    box-shadow: 0 0 20px #0f0, inset 0 0 20px rgba(0, 255, 0, 0.1);
    background: #000;
  }
  
  .panel {
    border: 1px solid #0f0;
    padding: 15px;
    min-width: 180px;
    box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
  }
  
  .panel-title {
    border-bottom: 1px solid #0f0;
    padding-bottom: 8px;
    margin-bottom: 12px;
    text-align: center;
    font-size: 14px;
    letter-spacing: 2px;
  }
  
  .stat {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
    font-size: 14px;
  }
  
  .stat-value {
    color: #0f0;
    text-shadow: 0 0 5px #0f0;
  }
  
  .controls {
    margin-top: 15px;
    font-size: 12px;
    line-height: 1.8;
  }
  
  .controls span {
    color: #0a0;
  }
  
  #nextCanvas {
    border: 1px solid #0a0;
    background: #000;
    margin-top: 10px;
  }
  
  .message {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #000;
    border: 2px solid #0f0;
    padding: 30px 50px;
    font-size: 18px;
    text-align: center;
    box-shadow: 0 0 30px #0f0;
    z-index: 50;
    display: none;
  }
  
  .message.show {
    display: block;
  }
  
  .message button {
    background: #000;
    color: #0f0;
    border: 1px solid #0f0;
    padding: 10px 20px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    cursor: pointer;
    margin-top: 15px;
  }
  
  .message button:hover {
    background: #0f0;
    color: #000;
  }
</style>
</head>
<body>
<div class="title">
  &gt; AIMD_TERMINAL_TETRIS <span class="cursor">_</span>
</div>
<div class="container">
  <div class="panel">
    <div class="panel-title">// STATS</div>
    <div class="stat">
      <span>SCORE:</span>
      <span class="stat-value" id="score">0</span>
    </div>
    <div class="stat">
      <span>LINES:</span>
      <span class="stat-value" id="lines">0</span>
    </div>
    <div class="stat">
      <span>LEVEL:</span>
      <span class="stat-value" id="level">1</span>
    </div>
    <div class="panel-title" style="margin-top: 20px;">// NEXT</div>
    <canvas id="nextCanvas" width="120" height="120"></canvas>
  </div>
  
  <canvas id="board" width="300" height="600"></canvas>
  
  <div class="panel">
    <div class="panel-title">// CONTROLS</div>
    <div class="controls">
      <div><span>[←→]</span> MOVE</div>
      <div><span>[↑]</span> ROTATE</div>
      <div><span>[↓]</span> SOFT DROP</div>
      <div><span>[SPACE]</span> HARD DROP</div>
      <div><span>[P]</span> PAUSE</div>
    </div>
    <div class="panel-title" style="margin-top: 20px;">// AIMD</div>
    <div style="font-size: 11px; line-height: 1.6; color: #0a0;">
      &gt; AI-DRIVEN<br>
      &gt; MODULAR<br>
      &gt; DESIGN<br>
      <br>
      Building blocks<br>
      of intelligence.
    </div>
  </div>
</div>

<div class="message" id="message">
  <div id="messageText">GAME OVER</div>
  <button onclick="resetGame()">RESTART</button>
</div>

<script>
  // Constants
  const COLS = 10;
  const ROWS = 20;
  const BLOCK = 30;
  
  const canvas = document.getElementById('board');
  const ctx = canvas.getContext('2d');
  
  const nextCanvas = document.getElementById('nextCanvas');
  const nextCtx = nextCanvas.getContext('2d');
  
  // Tetromino definitions
  const PIECES = {
    'I': { color: '#0ff', blocks: [[0,1],[1,1],[2,1],[3,1]] },
    'O': { color: '#ff0', blocks: [[0,0],[1,0],[0,1],[1,1]] },
    'T': { color: '#a0f', blocks: [[0,1],[1,1],[2,1],[1,0]] },
    'S': { color: '#0f0', blocks: [[0,1],[1,1],[1,0],[2,0]] },
    'Z': { color: '#f00', blocks: [[0,0],[1,0],[1,1],[2,1]] },
    'J': { color: '#00f', blocks: [[0,0],[0,1],[1,1],[2,1]] },
    'L': { color: '#fa0', blocks: [[2,0],[0,1],[1,1],[2,1]] }
  };
  
  const PIECE_NAMES = Object.keys(PIECES);
  
  // Game state
  let board = createBoard();
  let currentPiece = null;
  let nextPiece = null;
  let score = 0;
  let lines = 0;
  let level = 1;
  let gameOver = false;
  let paused = false;
  let lastTime = 0;
  let dropCounter = 0;
  let dropInterval = 1000;
  
  function createBoard() {
    return Array.from({length: ROWS}, () => Array(COLS).fill(null));
  }
  
  function randomPiece() {
    const name = PIECE_NAMES[Math.floor(Math.random() * PIECE_NAMES.length)];
    return {
      name: name,
      blocks: PIECES[name].blocks.map(b => [...b]),
      color: PIECES[name].color,
      x: 3,
      y: 0
    };
  }
  
  function spawnPiece() {
    currentPiece = nextPiece || randomPiece();
    nextPiece = randomPiece();
    currentPiece.x = 3;
    currentPiece.y = 0;
    
    if (collides(currentPiece, 0, 0)) {
      gameOver = true;
      showMessage('GAME OVER');
    }
  }
  
  function collides(piece, dx, dy) {
    for (let [bx, by] of piece.blocks) {
      const nx = piece.x + bx + dx;
      const ny = piece.y + by + dy;
      if (nx < 0 || nx >= COLS || ny >= ROWS) return true;
      if (ny >= 0 && board[ny][nx]) return true;
    }
    return false;
  }
  
  function merge(piece) {
    for (let [bx, by] of piece.blocks) {
      const nx = piece.x + bx;
      const ny = piece.y + by;
      if (ny >= 0 && ny < ROWS && nx >= 0 && nx < COLS) {
        board[ny][nx] = piece.color;
      }
    }
  }
  
  function rotate(piece) {
    // Find bounding box
    const blocks = piece.blocks;
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for (let [x, y] of blocks) {
      minX = Math.min(minX, x); maxX = Math.max(maxX, x);
      minY = Math.min(minY, y); maxY = Math.max(maxY, y);
    }
    const w = maxX - minX;
    const h = maxY - minY;
    // Rotate around center
    const cx = (minX + maxX) / 2;
    const cy = (minY + maxY) / 2;
    const rotated = blocks.map(([x, y]) => {
      const dx = x - cx;
      const dy = y - cy;
      // 90deg clockwise: (x, y) -> (y, -x)
      return [Math.round(cx + dy), Math.round(cy - dx)];
    });
    
    // Normalize so minimum is 0,0
    let newMinX = Infinity, newMinY = Infinity;
    for (let [x, y] of rotated) {
      newMinX = Math.min(newMinX, x);
      newMinY = Math.min(newMinY, y);
    }
    const normalized = rotated.map(([x, y]) => [x - newMinX, y - newMinY]);
    
    const oldBlocks = piece.blocks;
    piece.blocks = normalized;
    
    // Wall kick attempts
    if (collides(piece, 0, 0)) {
      piece.blocks = oldBlocks;
    }
  }
  
  function clearLines() {
    let cleared = 0;
    for (let y = ROWS - 1; y >= 0; y--) {
      if (board[y].every(cell => cell !== null)) {
        board.splice(y, 1);
        board.unshift(Array(COLS).fill(null));
        cleared++;
        y++; // check same row again
      }
    }
    if (cleared > 0) {
      score += cleared * 100;
      lines += cleared;
      level = Math.floor(lines / 10) + 1;
      dropInterval = Math.max(100, 1000 - (level - 1) * 100);
      updateStats();
    }
  }
  
  function move(dx, dy) {
    if (!collides(currentPiece, dx, dy)) {
      currentPiece.x += dx;
      currentPiece.y += dy;
      return true;
    }
    return false;
  }
  
  function drop() {
    if (!move(0, 1)) {
      merge(currentPiece);
      clearLines();
      spawnPiece();
    }
    dropCounter = 0;
  }
  
  function hardDrop() {
    while (move(0, 1)) {}
    drop();
  }
  
  function updateStats() {
    document.getElementById('score').textContent = score;
    document.getElementById('lines').textContent = lines;
    document.getElementById('level').textContent = level;
  }
  
  function drawBlock(c, x, y, color, size = BLOCK) {
    // Terminal glow effect
    c.fillStyle = color;
    c.shadowColor = color;
    c.shadowBlur = 8;
    c.fillRect(x * size + 1, y * size + 1, size - 2, size - 2);
    
    // Inner detail
    c.shadowBlur = 0;
    c.fillStyle = 'rgba(255,255,255,0.2)';
    c.fillRect(x * size + 1, y * size + 1, size - 2, 3);
    c.fillRect(x * size + 1, y * size + 1, 3, size - 2);
    
    c.fillStyle = 'rgba(0,0,0,0.3)';
    c.fillRect(x * size + 1, y * size + size - 4, size - 2, 3);
    c.fillRect(x * size + size - 4, y * size + 1, 3, size - 2);
    
    // ASCII character in middle for terminal feel
    c.fillStyle = 'rgba(0,0,0,0.6)';
    c.font = 'bold 12px Courier New';
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    c.fillText('#', x * size + size/2, y * size + size/2);
  }
  
  function draw() {
    // Clear
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Grid
    ctx.strokeStyle = 'rgba(0, 255, 0, 0.1)';
    ctx.lineWidth = 1;
    for (let x = 0; x <= COLS; x++) {
      ctx.beginPath();
      ctx.moveTo(x * BLOCK, 0);
      ctx.lineTo(x * BLOCK, ROWS * BLOCK);
      ctx.stroke();
    }
    for (let y = 0; y <= ROWS; y++) {
      ctx.beginPath();
      ctx.moveTo(0, y * BLOCK);
      ctx.lineTo(COLS * BLOCK, y * BLOCK);
      ctx.stroke();
    }
    
    // Board
    for (let y = 0; y < ROWS; y++) {
      for (let x = 0; x < COLS; x++) {
        if (board[y][x]) {
          drawBlock(ctx, x, y, board[y][x]);
        }
      }
    }
    
    // Ghost piece
    if (currentPiece && !gameOver) {
      const ghost = { ...currentPiece, blocks: currentPiece.blocks.map(b => [...b]) };
      while (!collides(ghost, 0, 1)) {
        ghost.y++;
      }
      ctx.globalAlpha = 0.3;
      for (let [bx, by] of ghost.blocks) {
        drawBlock(ctx, ghost.x + bx, ghost.y + by, currentPiece.color);
      }
      ctx.globalAlpha = 1;
      
      // Current piece
      for (let [bx, by] of currentPiece.blocks) {
        drawBlock(ctx, currentPiece.x + bx, currentPiece.y + by, currentPiece.color);
      }
    }
    
    // Next piece preview
    nextCtx.fillStyle = '#000';
    nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
    if (nextPiece) {
      // Center the next piece
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for (let [x, y] of nextPiece.blocks) {
        minX = Math.min(minX, x); maxX = Math.max(maxX, x);
        minY = Math.min(minY, y); maxY = Math.max(maxY, y);
      }
      const offsetX = (4 - (maxX - minX + 1)) / 2 - minX;
      const offsetY = (4 - (maxY - minY + 1)) / 2 - minY;
      for (let [bx, by] of nextPiece.blocks) {
        drawBlock(nextCtx, bx + offsetX, by + offsetY, nextPiece.color, 30);
      }
    }
  }
  
  function update(time = 0) {
    if (!gameOver && !paused) {
      const deltaTime = time - lastTime;
      dropCounter += deltaTime;
      
      if (dropCounter > dropInterval) {
        drop();
      }
      
      lastTime = time;
      draw();
    }
    requestAnimationFrame(update);
  }
  
  function showMessage(text) {
    document.getElementById('messageText').textContent = text;
    document.getElementById('message').classList.add('show');
  }
  
  function hideMessage() {
    document.getElementById('message').classList.remove('show');
  }
  
  function resetGame() {
    board = createBoard();
    score = 0;
    lines = 0;
    level = 1;
    dropInterval = 1000;
    gameOver = false;
    paused = false;
    nextPiece = null;
    spawnPiece();
    updateStats();
    hideMessage();
  }
  
  // Input handling
  document.addEventListener('keydown', (e) => {
    if (gameOver) return;
    
    switch(e.key) {
      case 'ArrowLeft':
        e.preventDefault();
        if (!paused) move(-1, 0);
        break;
      case 'ArrowRight':
        e.preventDefault();
        if (!paused) move(1, 0);
        break;
      case 'ArrowDown':
        e.preventDefault();
        if (!paused) drop();
        break;
      case 'ArrowUp':
        e.preventDefault();
        if (!paused) rotate(currentPiece);
        break;
      case ' ':
        e.preventDefault();
        if (!paused) hardDrop();
        break;
      case 'p':
      case 'P':
        paused = !paused;
        if (paused) showMessage('PAUSED');
        else hideMessage();
        break;
    }
  });
  
  // Init
  resetGame();
  requestAnimationFrame(update);
</script>
</body>
</html>
